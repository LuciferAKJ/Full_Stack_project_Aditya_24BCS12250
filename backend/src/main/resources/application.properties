# ===================================================
# AttendAI Backend — Application Properties
# ===================================================

spring.application.name=attendai-backend
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ---------------------------------------------------
# JPA / Hibernate (shared defaults)
# ---------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---------------------------------------------------
# JWT Configuration
# ---------------------------------------------------
jwt.secret=AttendAI-Super-Secret-Key-For-JWT-2026-Face-Recognition-System
jwt.expiration=86400000

# ---------------------------------------------------
# Python Microservice
# ---------------------------------------------------
python.service.url=http://localhost:5001

# ---------------------------------------------------
# File Upload
# ---------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Face data storage path
face.data.path=./face_data

# ---------------------------------------------------
# CORS
# ---------------------------------------------------
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# ---------------------------------------------------
# Logging
# ---------------------------------------------------
logging.level.com.attendai=INFO
logging.level.org.springframework.security=WARN

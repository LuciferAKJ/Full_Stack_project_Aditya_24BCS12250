# ===================================================
# Supabase PostgreSQL Profile
# Activate with: SPRING_PROFILES_ACTIVE=supabase
# ===================================================
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.fkiwqrkoclozcvxkbkni}
spring.datasource.password=${SUPABASE_DB_PASSWORD:Edusecure@17#}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP tuned for Supabase transaction pooler
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.jakarta.persistence.schema-generation.connection.handling-mode=delayed_acquisition_and_release_after_transaction
